services:
  postgres:
    image: postgres:16-alpine
    container_name: fleetflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fleetflow
      POSTGRES_PASSWORD: fleetflow
      POSTGRES_DB: fleetflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleetflow -d fleetflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleetflow-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://fleetflow:fleetflow@postgres:5432/fleetflow?schema=public
      JWT_SECRET: super_secret_change_me
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_DAYS: 7
      EMAIL_VERIFICATION_EXPIRES_HOURS: 24
      LOGIN_LOCKOUT_ATTEMPTS: 5
      LOGIN_LOCKOUT_MINUTES: 15
      REFRESH_COOKIE_NAME: fleetflow_refresh_token
      AUTH_RATE_LIMIT_MAX: 10
      FRONTEND_URL: http://localhost:5173
      CORS_ORIGIN: http://localhost:5173
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_SECURE: "${SMTP_SECURE:-false}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_FROM: "${SMTP_FROM:-FleetFlow <no-reply@fleetflow.com>}"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run prisma:generate && npm run build && npm run migrate && npm run start"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fleetflow-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:4000/api
      VITE_SOCKET_URL: http://localhost:4000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  postgres_data:
