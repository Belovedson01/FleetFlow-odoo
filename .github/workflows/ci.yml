name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fleetflow
          POSTGRES_PASSWORD: fleetflow
          POSTGRES_DB: fleetflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fleetflow -d fleetflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://fleetflow:fleetflow@localhost:5432/fleetflow?schema=public
      PORT: 4000
      JWT_SECRET: ci_secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_DAYS: 7
      EMAIL_VERIFICATION_EXPIRES_HOURS: 24
      REFRESH_COOKIE_NAME: fleetflow_refresh_token
      AUTH_RATE_LIMIT_MAX: 1000
      LOGIN_LOCKOUT_ATTEMPTS: 5
      LOGIN_LOCKOUT_MINUTES: 15
      FRONTEND_URL: http://localhost:5173
      CORS_ORIGIN: http://localhost:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: fleetflow/backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: fleetflow/backend
        run: npx prisma generate

      - name: Apply migrations
        working-directory: fleetflow/backend
        run: npx prisma migrate deploy

      - name: Build backend
        working-directory: fleetflow/backend
        run: npm run build

      - name: Run backend tests
        working-directory: fleetflow/backend
        run: npm run test

      - name: Install frontend dependencies
        working-directory: fleetflow/frontend
        run: npm ci

      - name: Build frontend
        working-directory: fleetflow/frontend
        run: npm run build
